novel_rules:

  # ── platform/governance/rules/global_rules.md ──────────────────────

  - target_rule_id: GR-004
    rule: "Never modify database migrations unless required by the current task."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Protects schema integrity by preventing accidental migration drift during
      unrelated tasks; no reference equivalent constrains this high-risk surface.

  - target_rule_id: GR-006
    rule: "Must not implement future sprint tasks."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Closes a scope-creep vector not covered by the reference system's
      general scope expansion prohibition.

  - target_rule_id: GR-011
    rule: "Output ONLY valid JSON unless the role's prompt specifies otherwise."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Prevents schema validation breakage caused by prose-wrapped JSON; complements
      ADR-008 at the agent instruction level.

  - target_rule_id: GR-012
    rule: "Must not wrap output in markdown code fences."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Eliminates a common LLM output defect that silently breaks downstream
      JSON parsers; the reference system has no equivalent guardrail.

  - target_rule_id: GR-013
    rule: "Must not include prose or explanation outside the JSON structure."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Partners with GR-011/GR-012 to make output-format discipline a
      first-class governance constraint rather than a parser implementation
      assumption.

  - target_rule_id: GR-014
    rule: "Must not implement behavior that contradicts an Accepted ADR; must flag the conflict instead."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Prevents silent ADR drift by forcing agents to surface contradictions
      rather than quietly work around them; no reference equivalent exists.

  - target_rule_id: GR-016
    rule: "All role prompts, schemas, and contracts must be versioned with the governance manifest."
    source: platform/governance/rules/global_rules.md
    adoption_recommendation: adopt
    rationale: >
      Anchors auditability — every execution run can be reproduced with the
      exact governance content that was active at the time.

  # ── platform/governance/rules/runtime_gates.md ─────────────────────

  - target_rule_id: RG-005
    rule: "The Fixer must address all gate failures before the Verifier is permitted to re-run."
    source: platform/governance/rules/runtime_gates.md
    adoption_recommendation: adopt
    rationale: >
      Prevents partial-fix loops where the Verifier is invoked before all
      listed corrections are addressed; the reference system has no equivalent
      ordering constraint.

  - target_rule_id: RG-006
    rule: "Each file change must trace to at least one acceptance criterion."
    source: platform/governance/rules/runtime_gates.md
    adoption_recommendation: adopt
    rationale: >
      Grounds every code change in a deliverable, making scope drift
      structurally detectable by the Verifier at artifact inspection time.

  - target_rule_id: RG-007
    rule: "The implementation summary must include a test_approach field describing test types, specific behaviors tested, and which acceptance criteria each test covers."
    source: platform/governance/rules/runtime_gates.md
    adoption_recommendation: adopt
    rationale: >
      Makes test intent auditable and prevents the Verifier from accepting
      tests that pass mechanically but miss the acceptance criteria intent.

  # ── platform/governance/rules/task_flags_contract.md ───────────────

  - target_rule_id: TF-006
    rule: "architecture_contract_change must be set true if ADRs or architecture docs change."
    source: platform/governance/rules/task_flags_contract.md
    adoption_recommendation: adopt
    rationale: >
      Closes the flag trigger gap — without this, architecture-touching tasks
      silently skip Stage B architecture doc loading.

  - target_rule_id: TF-007
    rule: "ui_evidence_required must be set true for any user-facing feature."
    source: platform/governance/rules/task_flags_contract.md
    adoption_recommendation: adopt
    rationale: >
      Provides an explicit set-condition for ui_evidence_required, preventing
      ambiguous Sprint Controller judgment calls on UI scope.

  # ── platform/governance/prompts/role-planner.md ────────────────────

  - target_rule_id: PP-002
    rule: "Planner output must be valid JSON matching phase_plan.schema.json exactly — no markdown, no prose."
    source: platform/governance/prompts/role-planner.md
    adoption_recommendation: adopt
    rationale: >
      Machine-validates Planner output at the artifact level, preventing a
      freeform plan from reaching downstream roles in an unparseable form.

  - target_rule_id: PP-003
    rule: "phase_id must follow the format PH-{STREAM}-{N} where STREAM is 2-6 uppercase letters."
    source: platform/governance/prompts/role-planner.md
    adoption_recommendation: adopt
    rationale: >
      Deterministic phase IDs enable unambiguous cross-artifact traceability
      and prevent duplicate or colliding phase identifiers.

  - target_rule_id: PP-004
    rule: "objectives must contain 2-4 measurable outcomes, each independently verifiable."
    source: platform/governance/prompts/role-planner.md
    adoption_recommendation: adopt
    rationale: >
      Bounds objective scope to prevent vague plans that cannot be verified
      at sprint close.

  - target_rule_id: PP-005
    rule: "deliverables must be concrete artifacts or features that can be checked into Git."
    source: platform/governance/prompts/role-planner.md
    adoption_recommendation: adopt
    rationale: >
      Eliminates non-auditable deliverables (e.g., "understanding of X") that
      cannot be confirmed in the task archive.

  - target_rule_id: PP-006
    rule: "Phase status must always be 'Draft' — the Planner must never activate a phase."
    source: platform/governance/prompts/role-planner.md
    adoption_recommendation: adopt
    rationale: >
      Enforces the separation between planning authority and activation
      authority, preventing unreviewed phases from entering execution.

  - target_rule_id: PP-007
    rule: "Must not produce sprint plans or implementation details — that is the Sprint Controller's job."
    source: platform/governance/prompts/role-planner.md
    adoption_recommendation: adopt
    rationale: >
      Reinforces role boundary at the prompt level for the most common
      Planner over-reach pattern.

  # ── platform/governance/prompts/role-sprint-controller.md ──────────

  - target_rule_id: SC-004
    rule: "sprint_id must follow the format S<NN> (e.g. S01, S02)."
    source: platform/governance/prompts/role-sprint-controller.md
    adoption_recommendation: adopt
    rationale: >
      Deterministic sprint IDs prevent archive path collisions and enable
      reliable cross-artifact linking.

  - target_rule_id: SC-005
    rule: "task_id must follow the format S<NN>-<NNN> (e.g. S01-001)."
    source: platform/governance/prompts/role-sprint-controller.md
    adoption_recommendation: adopt
    rationale: >
      Paired with SC-004, ensures every task has a globally unique,
      predictable identifier across all sprint archives.

  - target_rule_id: SC-006
    rule: "tasks in sprint_plan must be an array of task_id strings, not objects."
    source: platform/governance/prompts/role-sprint-controller.md
    adoption_recommendation: adopt
    rationale: >
      Prevents schema drift in the sprint plan that would break downstream
      task-iteration logic.

  - target_rule_id: SC-007
    rule: "files_likely_affected must be specific file paths relative to project root, 2-5 files maximum."
    source: platform/governance/prompts/role-sprint-controller.md
    adoption_recommendation: adopt
    rationale: >
      Grounds the Implementer's scope before execution begins, reducing
      ambiguity about which files are in scope.

  - target_rule_id: SC-008
    rule: "acceptance_criteria must be testable, specific, and verifiable by the Verifier AI."
    source: platform/governance/prompts/role-sprint-controller.md
    adoption_recommendation: adopt
    rationale: >
      Prevents acceptance criteria that pass human review but cannot be
      evaluated deterministically by the Verifier role.

  # ── platform/governance/prompts/role-implementer.md ────────────────

  - target_rule_id: IP-001
    rule: "Implementer's primary source of truth must be AI_IMPLEMENTATION_BRIEF.md."
    source: platform/governance/prompts/role-implementer.md
    adoption_recommendation: adopt
    rationale: >
      Anchors Implementer context to a single authoritative artifact,
      preventing divergence when multiple governance documents contain
      overlapping or contradictory guidance.

  - target_rule_id: IP-006
    rule: "Every file change must trace to an acceptance criterion in the implementation brief."
    source: platform/governance/prompts/role-implementer.md
    adoption_recommendation: adopt
    rationale: >
      Enforces RG-006 at the Implementer prompt level, making traceability
      a pre-commit obligation rather than a post-hoc Verifier check.

  - target_rule_id: IP-007
    rule: "files_changed action must be exactly 'Create' or 'Modify'."
    source: platform/governance/prompts/role-implementer.md
    adoption_recommendation: adopt
    rationale: >
      Ensures the Deliverables Checklist uses a controlled vocabulary the
      Verifier can evaluate deterministically.

  - target_rule_id: IP-008
    rule: "files_changed description must be specific enough for a developer or Verifier to verify."
    source: platform/governance/prompts/role-implementer.md
    adoption_recommendation: adopt
    rationale: >
      Prevents vague descriptions (e.g., "updated file") that satisfy the
      schema but convey no verifiable intent.

  - target_rule_id: IP-009
    rule: "test_approach must be concrete and not generic."
    source: platform/governance/prompts/role-implementer.md
    adoption_recommendation: adopt
    rationale: >
      Closes the loophole where Implementers emit boilerplate test_approach
      values that pass schema validation but provide no audit evidence.

  # ── platform/governance/prompts/role-verifier.md ───────────────────

  - target_rule_id: VP-002
    rule: "Must validate that each file in the Deliverables Checklist has an explicit Create or Modify action."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Ensures the Verifier cross-checks the Implementer's action vocabulary
      against the brief, catching missing or ambiguous deliverable entries.

  - target_rule_id: VP-003
    rule: "For Create deliverables: the file must exist in the plan."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Prevents the Verifier from passing a task where a declared Create
      artifact was never actually created.

  - target_rule_id: VP-004
    rule: "For Modify deliverables: the file must be changed within the current task scope."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Prevents a Verifier pass for scope-drifted changes to files not in
      the declared task scope.

  - target_rule_id: VP-005
    rule: "Must confirm required tests exist and match brief expectations."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Closes the gap between tests passing and tests covering the right
      behaviors as declared in the brief.

  - target_rule_id: VP-006
    rule: "Must confirm no unrelated scope expansion occurred (≤5 files, ≤200 lines constraint)."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Makes scope limit enforcement a named Verifier check, not an implied
      consequence of artifact inspection.

  - target_rule_id: VP-007
    rule: "Must confirm implementation traces to at least one acceptance criterion per file."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Directly enforces RG-006 from the Verifier side, creating a bilateral
      traceability obligation.

  - target_rule_id: VP-008
    rule: "result must be 'PASS' only if ALL acceptance criteria are met."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Prevents partial-pass verdicts where some criteria are satisfied and
      others are silently deferred.

  - target_rule_id: VP-009
    rule: "required_corrections must be an empty array on PASS and contain specific actionable items on FAIL."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Ensures FAIL verdicts carry the structured correction data the Fixer
      depends on, rather than free-text summaries.

  - target_rule_id: VP-010
    rule: "On PASS, handoff.next_role_action must be 'Sprint Controller archives task and closes it.'"
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Prescribes the exact handoff signal so Sprint Controller routing is
      deterministic and cannot be misread as a fix-loop trigger.

  - target_rule_id: VP-011
    rule: "On FAIL, handoff.next_role_action must be 'Fixer addresses only the listed corrections and re-verifies.'"
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Mirrors VP-010 for the failure path; prevents the Fixer from receiving
      ambiguous or missing routing instructions.

  - target_rule_id: VP-012
    rule: "Must not invent issues not evidenced in the artifacts."
    source: platform/governance/prompts/role-verifier.md
    adoption_recommendation: adopt
    rationale: >
      Prevents hallucinated corrections that expand the fix scope beyond what
      the Implementer actually produced.

  # ── platform/governance/prompts/role-fixer.md ──────────────────────

  - target_rule_id: FP-004
    rule: "Fixer must produce a handoff contract per AI_HANDOFF_CONTRACT.md."
    source: platform/governance/prompts/role-fixer.md
    adoption_recommendation: adopt
    rationale: >
      Ensures the Fixer emits a structured handoff after repairs, not a
      narrative summary, enabling deterministic Verifier re-routing.

  - target_rule_id: FP-005
    rule: "fixes_applied must contain one entry per correction item from verification_result.json."
    source: platform/governance/prompts/role-fixer.md
    adoption_recommendation: adopt
    rationale: >
      Creates a 1:1 traceability link between each listed correction and
      each applied fix, making partial-fix gaps detectable.

  - target_rule_id: FP-008
    rule: "Must not invent fixes for issues not present in the required_corrections list."
    source: platform/governance/prompts/role-fixer.md
    adoption_recommendation: adopt
    rationale: >
      Mirrors VP-012 for the Fixer role; prevents scope expansion disguised
      as proactive repair.

  # ── docs/functional_requirements/rule_registry.yml ─────────────────

  - target_rule_id: RR-PLN-003
    rule: "Planner must ensure each task is atomic and testable."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Complements SC-008 on the planning side by requiring the Planner to
      pre-validate task atomicity before sprint decomposition.

  - target_rule_id: RR-PLN-005
    rule: "Planner must include acceptance checks for each task."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Ensures every task carries verifiable acceptance criteria from the
      planning stage, not just at sprint-controller brief time.

  - target_rule_id: RR-PLN-006
    rule: "Planner must not include implementation-level detail in task definitions."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Preserves role separation by keeping the Planner out of the Sprint
      Controller's implementation decomposition domain.

  - target_rule_id: RR-PLN-007
    rule: "Planner must not create circular dependencies between tasks."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Prevents deadlocked sprint plans that cannot be executed in any valid
      sequential order.

  - target_rule_id: RR-PLN-008
    rule: "Planner must set task flags accurately for each task."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Extends flag-ownership responsibility to the Planner's planning output,
      establishing a pre-Sprint-Controller accuracy obligation.

  - target_rule_id: RR-CTL-001
    rule: "Sprint Controller must not implement code."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Mirrors RR-PLN-001 for the Sprint Controller role; the reference system
      omits an explicit no-code rule for this role.

  - target_rule_id: RR-IMP-004
    rule: "Implementer must keep scope minimal and avoid unrelated refactor."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Reinforces GR-005 at the role-registry level with documented_only
      enforcement, providing a named, citable rule for audit findings.

  - target_rule_id: RR-IMP-005
    rule: "Implementer must read the Task Flags block from the implementation brief before exploring additional documents."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Establishes an explicit sequencing obligation that prevents the
      Implementer from loading Stage B documents before evaluating flags.

  - target_rule_id: RR-IMP-007
    rule: "Implementer must load user_flow.md before writing any user-facing code if it exists."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Operationalizes the UX gate at the Implementer level, making
      user_flow.md a required pre-read rather than an optional reference.

  - target_rule_id: RR-IMP-009
    rule: "Implementer must implement the exact steps, inputs, outputs, and failure states defined in user_flow.md."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Prevents partial user-flow implementation that passes CI gates but
      silently omits documented failure states.

  - target_rule_id: RR-IMP-010
    rule: "Implementer must not invent alternative flows or skip failure handling defined in user_flow.md."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Closes the "creative shortcut" pattern where an LLM substitutes a
      simpler flow for the approved user_flow.md design.

  - target_rule_id: RR-IMP-011
    rule: "Implementer must load wireframe.md and ui_spec.md before implementing UI when they exist."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Extends the UX gate beyond user_flow.md to visual spec artifacts,
      closing a gap where UI components are implemented without design context.

  - target_rule_id: RR-IMP-012
    rule: "Implementer must ensure user-facing error messages match the failure-state descriptions in user_flow.md."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Makes error-message fidelity a named implementation obligation, not
      an implied consequence of user_flow.md conformance.

  - target_rule_id: RR-IMP-013
    rule: "Implementer must run required gates and tests."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Explicitly names gate execution as an Implementer exit obligation,
      preventing "I left it to CI" deferrals.

  - target_rule_id: RR-IMP-014
    rule: "Implementer must write real results to ai_dev_stack/ai_project_tasks/active/test_results.json."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Partners with RR-IMP-015 to make test result artifact production an
      explicit requirement, not a convention.

  - target_rule_id: RR-VER-001
    rule: "Verifier must validate only — must not implement or fix."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Named role-boundary rule for the Verifier at the registry level;
      the reference system relies on general GR-001 and lacks a Verifier-specific
      no-implement prohibition.

  - target_rule_id: RR-VER-002
    rule: "Verifier must return PASS or FAIL."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Constrains the Verifier to a binary verdict, preventing ambiguous
      partial-pass states that could stall the pipeline.

  - target_rule_id: RR-VER-003
    rule: "Verifier must verify that every Create deliverable exists."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Explicit artifact existence check at the registry level complements
      VP-003 with a named citable rule.

  - target_rule_id: RR-VER-004
    rule: "Verifier must verify that every Modify deliverable was actually changed in scope."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Complements RR-VER-003 for modification deliverables; prevents false
      passes where a file is listed as modified but unchanged.

  - target_rule_id: RR-VER-005
    rule: "Verifier must verify required tests are present and appropriate."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Bridges between gate pass/fail (mechanical) and test adequacy
      (qualitative), making test presence a named Verifier concern.

  - target_rule_id: RR-VER-007
    rule: "Verifier must fail verification if unrelated scope expansion is detected."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Makes scope drift an explicit FAIL condition, not just a Verifier
      observation, ensuring it cannot be silently noted and passed.

  - target_rule_id: RR-VER-008
    rule: "Verifier must verify TDN input and output field names and types match the approved TDN."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      TDN field-level conformance is a critical drift-prevention check the
      reference system entirely lacks; schema drift discovered post-deployment
      is expensive to remediate.

  - target_rule_id: RR-VER-009
    rule: "Verifier must verify component interfaces match the approved TDN."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Complements RR-VER-008 for interface-level conformance, preventing
      API contract drift that passes field checks but breaks callers.

  - target_rule_id: RR-VER-010
    rule: "Verifier must verify retry behavior, abort thresholds, and logging match the TDN error model."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Error model divergence is operationally invisible until an incident;
      gating it at verification time prevents silent runtime governance drift.

  - target_rule_id: RR-VER-011
    rule: "Verifier must flag any TDN deviation as a required correction even if tests pass."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Prevents "tests pass but contract is broken" false positives where
      all CI gates are green but the implementation diverges from the approved TDN.

  - target_rule_id: RR-VER-014
    rule: "Verifier must verify final full validation gates ran before close recommendation on fast-track tasks."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Ensures Fast Track's relaxed checkpoint cadence does not eliminate
      the final full gate run before a task is closed.

  - target_rule_id: RR-VER-015
    rule: "Verifier must verify that user_flow.md exists and has Status 'Approved' for any user-facing task."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Makes UX gate compliance a Verifier hard-stop, not just an Implementer
      pre-condition, preventing approved tasks from shipping without an approved flow.

  - target_rule_id: RR-VER-016
    rule: "Verifier must verify the happy path defined in user_flow.md is reachable end-to-end."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Closes the gap between "user_flow.md exists and is Approved" and
      "the implementation actually realises it."

  - target_rule_id: RR-VER-017
    rule: "Verifier must verify at least one documented failure state produces the correct user-visible error message."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Pairs with RR-IMP-012 — the Verifier must confirm what the Implementer
      was obligated to produce, closing the bilateral loop.

  - target_rule_id: RR-VER-018
    rule: "Verifier must verify CLI output is human-readable and not a raw JSON dump unless explicitly specified."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: evaluate
    rationale: >
      Valuable for CLI-facing features but overly prescriptive for
      API-only or background tasks; scope to CLI/conversational flow types only.

  - target_rule_id: RR-VER-019
    rule: "Verifier must verify all UI status, error, and loading states defined in the flow are visually distinct."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: evaluate
    rationale: >
      Valid for UI tasks but non-applicable to backend-only work; adopt
      conditionally when ui_evidence_required is true.

  - target_rule_id: RR-VER-020
    rule: "Verifier must verify chat responses match the tone and format described in the flow."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: evaluate
    rationale: >
      Applicable to conversational interface features only; requires
      a defined tone/format spec in user_flow.md to be verifiable.

  - target_rule_id: RR-VER-021
    rule: "Verifier must fail if any step in user_flow.md is broken or silently skipped."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Zero-tolerance for silent flow omissions; prevents partial UX
      implementations that pass gate checks but break user journeys.

  - target_rule_id: RR-VER-022
    rule: "Verifier must emit compact handoff fields from AI_HANDOFF_CONTRACT.md on FAIL."
    source: docs/functional_requirements/rule_registry.yml
    adoption_recommendation: adopt
    rationale: >
      Named obligation at the registry level ensuring FAIL verdicts always
      carry structured handoff data even when the Verifier prompt is changed.

  - target_rule_id: RR-VER-023
    rule: "Verifier must write ai_dev_stack/ai_project_tasks/active/verification_result.json with the required fields."
