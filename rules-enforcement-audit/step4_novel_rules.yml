  - target_rule_id: ADR30-007
    rule: "Sprint Controller close-out must open a GitHub Pull Request from the feature branch to the default branch."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      PR creation as a named close-out obligation creates the human review
      gate required by ADR6-001 without relying on operator memory.

  - target_rule_id: ADR30-009
    rule: "After 3 consecutive Implementer attempts without a Verifier pass, the pipeline must transition to 'failed' and trigger human escalation."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      ADR-level backing for PS-004/PS-005; prevents infinite fix-loop
      execution without a ceiling at the architecture level.

  - target_rule_id: ADR30-010
    rule: "Implementer attempting to modify files outside the declared scope must trigger mandatory human escalation."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      Out-of-scope file modification during autonomous execution is a
      high-severity governance breach requiring immediate human intervention.

  - target_rule_id: ADR30-011
    rule: "Verifier detecting changes to files not listed in the implementation brief (scope drift) must trigger mandatory human escalation."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      Verifier-side scope drift detection mirrors ADR30-010 for post-hoc
      detection, ensuring escalation even if the Implementer constraint was bypassed.

  - target_rule_id: ADR30-012
    rule: "Schema validation failures beyond the configured retry limit must trigger mandatory human escalation."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      Prevents repeated schema-invalid LLM outputs from looping silently;
      surfaces persistent governance violations to human operators.

  - target_rule_id: ADR30-013
    rule: "Git operation failures (merge conflict, push rejection) must trigger mandatory human escalation."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      Git failures are infrastructure events that autonomous agents cannot
      safely resolve; human escalation is the only safe response.

  - target_rule_id: ADR30-014
    rule: "PR body must be populated with structured content (sprint summary, tasks, verification results, pipeline metadata) — not generated by LLM prose."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      Structured PR bodies enable automated PR audit tooling and eliminate
      LLM non-determinism in the human review surface.

  - target_rule_id: ADR30-015
    rule: "The pipeline is considered complete only when the PR is merged, detected via GitHub webhook or polling."
    source: docs/adr/adr-030-autonomous-sprint-execution.md
    adoption_recommendation: adopt
    rationale: >
      Anchors pipeline completion to a code-merged event, not a
      status flag, preventing false-complete states where the PR was
      abandoned.